<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>사랑이 싹트는 42</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Gowun+Dodum&display=swap');

  :root{
    --bg:#0d0b14; --crt:#100c1a; --line:#2a2138;
    --ink:#e8d8f0; --dim:#7a6b8f;
    --pink:#ff6fae; --pink-soft:#ffa6cf; --mint:#7af0c8; --gold:#ffd56b;
    --glow:rgba(255,111,174,.5);
    --mono:'DM Mono',ui-monospace,Menlo,Consolas,monospace;
    --kr:'Gowun Dodum','DM Mono',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(ellipse at 50% -20%,#221634 0%,var(--bg) 60%),var(--bg);
    color:var(--ink);font-family:var(--mono);height:100vh;overflow:hidden;
    display:flex;flex-direction:column;
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:80;
    background:repeating-linear-gradient(transparent 0 2px,rgba(0,0,0,.16) 2px 3px),
      radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.45) 100%);
    mix-blend-mode:multiply;
  }

  header{
    display:flex;align-items:center;gap:14px;padding:13px 26px;
    border-bottom:1px solid var(--line);background:linear-gradient(90deg,#1a1228,#15101f);flex:0 0 auto;
  }
  header .heart{font-size:18px;color:var(--pink);filter:drop-shadow(0 0 8px var(--glow));animation:beat 1.4s infinite;}
  @keyframes beat{0%,100%{transform:scale(1);}15%{transform:scale(1.25);}30%{transform:scale(1);}45%{transform:scale(1.18);}}
  header h1{font-family:var(--kr);font-size:17px;margin:0;letter-spacing:.06em;
    background:linear-gradient(90deg,var(--pink-soft),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;}
  header .sub{color:var(--dim);font-size:12px;letter-spacing:.12em;}
  #conn{margin-left:auto;font-size:11px;letter-spacing:.1em;padding:5px 13px;border:1px solid var(--line);border-radius:20px;color:var(--gold);}
  #conn.on{color:var(--mint);border-color:rgba(122,240,200,.4);} #conn.off{color:var(--dim);}

  /* 단계 인디케이터 */
  .steps{display:flex;gap:8px;align-items:center;margin-left:24px;}
  .steps .s{font-size:11px;letter-spacing:.08em;color:var(--dim);display:flex;align-items:center;gap:8px;}
  .steps .s b{width:20px;height:20px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-weight:400;}
  .steps .s.active{color:var(--pink-soft);} .steps .s.active b{border-color:var(--pink);background:rgba(255,111,174,.15);color:var(--pink);}
  .steps .arr{color:var(--line);}

  main{flex:1 1 auto;position:relative;overflow:hidden;}
  .screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:42px;
    opacity:0;visibility:hidden;transition:opacity .5s ease;}
  .screen.show{opacity:1;visibility:visible;}

  /* ===== STEP 1 작성 ===== */
  #compose .card{width:min(560px,94%);background:linear-gradient(160deg,#171022,#120c1d);
    border:1px solid var(--line);border-radius:18px;padding:34px 36px;
    box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 50px rgba(255,111,174,.06);}
  #compose .title{font-family:var(--kr);font-size:18px;color:var(--pink-soft);margin:0 0 22px;letter-spacing:.04em;text-align:center;}
  label{display:block;font-family:var(--kr);font-size:12px;color:var(--dim);margin-bottom:8px;}
  select,input,textarea{width:100%;background:#0c0814;border:1px solid var(--line);color:var(--ink);
    font-family:var(--kr);font-size:14px;padding:11px 13px;border-radius:10px;outline:none;transition:.15s;}
  select{font-family:var(--mono);} 
  select:focus,input:focus,textarea:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,111,174,.12);}
  textarea{resize:vertical;min-height:92px;line-height:1.65;}
  .gap{height:16px;} .hint{font-family:var(--kr);font-size:11px;color:var(--dim);margin-top:7px;line-height:1.5;}
  .btn-send{width:100%;margin-top:22px;color:#1a0a12;font-weight:500;letter-spacing:.04em;font-family:var(--kr);
    font-size:15px;cursor:pointer;border:none;border-radius:11px;padding:14px;
    background:linear-gradient(90deg,var(--pink),var(--pink-soft));box-shadow:0 6px 22px rgba(255,111,174,.32);transition:.15s;}
  .btn-send:hover{filter:brightness(1.08);transform:translateY(-1px);}

  /* ===== STEP 2 배달 중 ===== */
  #deliver{flex-direction:column;gap:26px;}
  #deliver .head{font-family:var(--kr);font-size:20px;color:var(--pink-soft);letter-spacing:.05em;text-align:center;}
  #deliver .head .dots::after{content:"";animation:dots 1.4s steps(4,end) infinite;}
  @keyframes dots{0%{content:"";}25%{content:"·";}50%{content:"··";}75%{content:"···";}}
  /* 미니맵 */
  .map{position:relative;width:min(560px,90%);height:300px;border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(#120c1d,#0e0a17);overflow:hidden;
    background-image:linear-gradient(rgba(122,240,200,.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(122,240,200,.05) 1px,transparent 1px);background-size:30px 30px;}
  .map .seatdot{position:absolute;width:34px;height:34px;border-radius:9px;transform:translate(-50%,-50%);
    border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--dim);background:#100c1a;}
  .map .seatdot.target{border-color:var(--pink);color:var(--pink-soft);box-shadow:0 0 18px var(--glow);
    animation:tpulse 1.1s infinite;}
  @keyframes tpulse{50%{box-shadow:0 0 30px var(--glow);}}
  .map .bot{position:absolute;width:26px;height:26px;border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 35% 30%,var(--mint),#1f7a5e);box-shadow:0 0 16px rgba(122,240,200,.6);
    transition:left 4s cubic-bezier(.4,.05,.3,1),top 4s cubic-bezier(.4,.05,.3,1);z-index:3;}
  .map .bot::after{content:"🤖";position:absolute;inset:0;display:grid;place-items:center;font-size:14px;}
  .map svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;}
  .map .trail{stroke:var(--pink);stroke-width:2;stroke-dasharray:5 6;fill:none;opacity:.5;}
  .progress{width:min(560px,90%);height:6px;background:#0c0814;border-radius:4px;overflow:hidden;}
  .progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--mint));transition:width .3s;}
  .bgm{display:flex;align-items:center;gap:11px;font-family:var(--kr);font-size:13px;color:var(--gold);}
  .bgm .note{animation:float 1.6s ease-in-out infinite;} @keyframes float{50%{transform:translateY(-4px);}}
  .eq{display:inline-flex;gap:3px;align-items:flex-end;height:15px;}
  .eq i{width:3px;background:var(--gold);border-radius:2px;animation:eq 900ms ease-in-out infinite;}
  .eq i:nth-child(2){animation-delay:.15s;}.eq i:nth-child(3){animation-delay:.3s;}.eq i:nth-child(4){animation-delay:.45s;}
  @keyframes eq{0%,100%{height:4px;}50%{height:15px;}}

  /* 테스트 블록 (추후 삭제 가능) */
  .testbox{margin-top:6px;border:1px dashed var(--line);border-radius:10px;padding:10px 14px;
    font-family:var(--mono);font-size:11px;color:var(--dim);display:flex;align-items:center;gap:12px;}
  .testbox button{font-family:var(--kr);cursor:pointer;border:1px solid var(--pink);background:transparent;color:var(--pink-soft);
    border-radius:8px;padding:7px 16px;font-size:12px;}
  .testbox button:hover{background:rgba(255,111,174,.12);}

  /* ===== STEP 3 수신 ===== */
  #receive .frame{width:min(640px,94%);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    background:linear-gradient(160deg,#1a1226,#120c1d);
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(255,111,174,.1);animation:rise .6s cubic-bezier(.2,.7,.3,1);}
  @keyframes rise{from{opacity:0;transform:translateY(26px) scale(.97);}to{opacity:1;transform:none;}}
  .frame .bar{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--line);
    background:#0e0a17;font-size:11px;color:var(--dim);letter-spacing:.06em;}
  .frame .bar i{width:10px;height:10px;border-radius:50%;}
  .dot1{background:#ff5f57;}.dot2{background:#febc2e;}.dot3{background:#28c840;}
  .frame .bar span{margin-left:8px;}
  .frame .inner{padding:32px 38px 28px;}
  .ribbon{font-family:var(--kr);text-align:center;color:var(--pink);font-size:17px;letter-spacing:.05em;
    filter:drop-shadow(0 0 10px var(--glow));}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);
    border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);padding:12px 2px;margin:18px 0 24px;letter-spacing:.03em;}
  .meta b{color:var(--mint);font-weight:400;}
  .message{font-family:var(--kr);font-size:clamp(19px,2.6vw,27px);line-height:1.8;text-align:center;min-height:1.8em;letter-spacing:.01em;}
  .quote{color:var(--pink-soft);}
  .cursor{display:inline-block;width:.5ch;background:var(--pink);margin-left:1px;color:transparent;
    animation:blink 1s step-end infinite;box-shadow:0 0 8px var(--glow);}
  @keyframes blink{50%{opacity:0;}}
  .bgm-r{margin-top:26px;display:flex;justify-content:center;}
  .again{margin-top:20px;text-align:center;}
  .again button{background:transparent;border:1px solid var(--line);color:var(--dim);font-family:var(--mono);
    font-size:11px;letter-spacing:.1em;padding:8px 18px;border-radius:20px;cursor:pointer;}
  .again button:hover{color:var(--pink-soft);border-color:var(--pink);}

  .heartfx{position:absolute;bottom:-20px;font-size:18px;pointer-events:none;animation:up 3s linear forwards;z-index:60;}
  @keyframes up{to{transform:translateY(-110vh) rotate(40deg);opacity:0;}}
  .log{position:absolute;bottom:14px;left:24px;right:24px;font-family:var(--mono);font-size:10px;color:var(--line);
    max-height:42px;overflow:hidden;line-height:1.8;z-index:60;}
  .log span{color:var(--pink-soft);}
</style>
</head>
<body>

<header>
  <span class="heart">♥</span>
  <h1>사랑이 싹트는 42</h1>
  <span class="sub">터틀봇이 전하는, 차마 하지 못했던 말</span>
  <div class="steps">
    <div class="s active" data-s="1"><b>1</b>작성</div><span class="arr">→</span>
    <div class="s" data-s="2"><b>2</b>배달 중</div><span class="arr">→</span>
    <div class="s" data-s="3"><b>3</b>수신</div>
  </div>
  <span id="conn" class="off">○ 터틀봇 대기</span>
</header>

<main>
  <!-- STEP 1 -->
  <section class="screen show" id="compose">
    <div class="card">
      <p class="title">✉ 익명으로 마음을 전하세요</p>
      <label>받는 사람 좌석</label>
      <select id="seat"></select>
      <div class="gap"></div>
      <label>전하고 싶은 말</label>
      <textarea id="msg" placeholder="오늘 옆에 앉아서 공부했는데, 덕분에 집중 잘 됐어요. 고마워요…"></textarea>
      <div class="gap"></div>
      <label>함께 보낼 BGM</label>
      <select id="bgmSel"></select>
      <p class="hint">＊ 보낸 사람은 <b style="color:var(--pink-soft)">익명</b>으로 전달돼요. 터틀봇이 직접 좌석까지 배달합니다.</p>
      <button class="btn-send" id="send">♥ 터틀봇으로 보내기</button>
    </div>
  </section>

  <!-- STEP 2 -->
  <section class="screen" id="deliver">
    <div class="head">터틀봇이 <span id="dseat" style="color:var(--mint)"></span> 으로 출발했어요<span class="dots"></span></div>
    <div class="map" id="map"><svg><path class="trail" id="trail"/></svg></div>
    <div class="progress"><i id="bar"></i></div>
    <div class="bgm"><span class="note">🎵</span><span id="bgmNow"></span>
      <span class="eq"><i></i><i></i><i></i><i></i></span>
      <span style="color:var(--dim);font-size:11px">(BGM 재생 중…)</span></div>

    <!-- ▼▼▼ 테스트용 블록 — 실제 배포 시 이 div 통째로 삭제하면 됩니다 ▼▼▼ -->
    <div class="testbox" id="testbox">
      <span>// TEST · 실제로는 ROS2 도착 신호로 전환됩니다</span>
      <button id="forceArrive">▶ 도착시키기</button>
    </div>
    <!-- ▲▲▲ 테스트용 블록 끝 ▲▲▲ -->
  </section>

  <!-- STEP 3 -->
  <section class="screen" id="receive">
    <div class="frame">
      <div class="bar"><i class="dot1"></i><i class="dot2"></i><i class="dot3"></i>
        <span id="barpath">~/cluster/mailbox — delivered by turtlebot</span></div>
      <div class="inner">
        <div class="ribbon">♥ 새로운 메시지가 도착했습니다 ♥</div>
        <div class="meta"><span>보낸 사람 : <b>??? (익명)</b></span>
          <span>받은 시각 : <b id="ts"></b></span></div>
        <div class="message" id="message"></div>
        <div class="bgm-r"><div class="bgm"><span class="note">🎵</span><span id="bgmNow2"></span>
          <span class="eq"><i></i><i></i><i></i><i></i></span></div></div>
        <div class="again"><button id="again">↺ 처음으로</button></div>
      </div>
    </div>
  </section>

  <div class="log" id="log"></div>
</main>

<script>
/* =========================================================================
   [1] 좌석 ↔ 좌표  /  맵 표시용 픽셀 위치(0~1 비율)  ← 추후 실측값으로 교체
   ========================================================================= */
const SEATS = {
  1:{x:1.50,y:0.80, label:"C1 · 창가 1열", mx:0.20,my:0.25},
  2:{x:2.30,y:-0.40,label:"C2 · 창가 2열", mx:0.50,my:0.20},
  3:{x:0.60,y:1.70, label:"C3 · 중앙 1열", mx:0.78,my:0.30},
  4:{x:-1.20,y:0.90,label:"C4 · 중앙 2열", mx:0.30,my:0.60},
  5:{x:3.10,y:2.20, label:"C5 · 복도 쪽",  mx:0.62,my:0.66},
  6:{x:0.00,y:-1.50,label:"C6 · 입구 쪽",  mx:0.84,my:0.74},
};
const BOT_HOME = {mx:0.5, my:0.92};   // 터틀봇 출발 지점(맵상)

/* BGM 목록  ← src에 파일 경로를 넣으면 실제 재생. 비우면 자막만. */
const BGMS = {
  "love1":{title:"나는 너를", src:""},
  "love2":{title:"첫사랑", src:""},
  "love3":{title:"봄날의 고백", src:""},
};

/* =========================================================================
   [2] 상태
   ========================================================================= */
let current = {seat:null, msg:"", bgm:null};
let audio = null, typing=false;

/* 작성 화면 채우기 */
const seatSel=document.getElementById('seat');
Object.entries(SEATS).forEach(([n,s])=>{
  const o=document.createElement('option');o.value=n;o.textContent=`#${n} · ${s.label}`;seatSel.append(o);
});
const bgmSel=document.getElementById('bgmSel');
Object.entries(BGMS).forEach(([k,b])=>{
  const o=document.createElement('option');o.value=k;o.textContent=`🎵 ${b.title}`;bgmSel.append(o);
});

/* =========================================================================
   [3] STEP 1 → 2 : 보내기 = 터틀봇 출발 + BGM 시작 + 배달중 화면
   ========================================================================= */
document.getElementById('send').onclick=()=>{
  const text=document.getElementById('msg').value.trim();
  if(!text){alert("메시지를 입력해 주세요");return;}
  const seat=Number(seatSel.value);
  const bgmKey=bgmSel.value;
  current={seat,msg:text,bgm:BGMS[bgmKey]};

  goStep(2);
  document.getElementById('dseat').textContent=`#${seat} ${SEATS[seat].label}`;
  document.getElementById('bgmNow').textContent=current.bgm.title;
  document.getElementById('bgmNow2').textContent=current.bgm.title;
  startBGM();
  flashLog(`출발 → <span>#${seat} ${SEATS[seat].label}</span> · BGM "${current.bgm.title}"`);

  // 실제 ROS2라면: 여기서 노드로 목표좌표 publish 요청을 보냄
  if(window.__ws && window.__ws.readyState===1){
    window.__ws.send(JSON.stringify({type:"goto", seat, x:SEATS[seat].x, y:SEATS[seat].y}));
  }

  runDeliveryAnim(seat);
};

/* 배달 애니메이션(미니맵 위 봇 이동 + 진행바). 도착 전환은 ROS2 신호/테스트 버튼이 담당 */
function runDeliveryAnim(seat){
  const map=document.getElementById('map');
  map.querySelectorAll('.seatdot,.bot').forEach(e=>e.remove());
  // 좌석 점
  Object.entries(SEATS).forEach(([n,s])=>{
    const d=document.createElement('div');d.className='seatdot'+(Number(n)===seat?' target':'');
    d.style.left=(s.mx*100)+'%';d.style.top=(s.my*100)+'%';d.textContent='#'+n;map.append(d);
  });
  // 봇
  const bot=document.createElement('div');bot.className='bot';
  bot.style.left=(BOT_HOME.mx*100)+'%';bot.style.top=(BOT_HOME.my*100)+'%';map.append(bot);
  // 경로선
  const t=SEATS[seat];const tr=document.getElementById('trail');
  tr.setAttribute('d',`M ${BOT_HOME.mx*560} ${BOT_HOME.my*300} L ${t.mx*560} ${t.my*300}`);
  // 이동
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    bot.style.left=(t.mx*100)+'%';bot.style.top=(t.my*100)+'%';
  });});
  // 진행바(연출용 4초)
  const bar=document.getElementById('bar');bar.style.width='0';
  let p=0;const id=setInterval(()=>{p+=2.5;bar.style.width=Math.min(p,98)+'%';if(p>=98)clearInterval(id);},90);
}

/* =========================================================================
   [4] STEP 2 → 3 : 도착 = 수신 화면 + 쪽지 타이핑 + 하트 (BGM 유지)
   ========================================================================= */
async function arrive(){
  if(typing)return;
  goStep(3);
  document.getElementById('ts').textContent=stamp();
  document.getElementById('barpath').textContent=`~/cluster/seat_${current.seat} — delivered by turtlebot`;
  flashLog(`<span>♥ 도착</span> #${current.seat} — 메시지 출력`);
  burstHearts();
  await typeText(current.msg);
}

async function typeText(text,speed=130){
  const d=document.getElementById('message');typing=true;d.innerHTML='';
  d.insertAdjacentHTML('beforeend','<span class="quote">“</span>');
  const span=document.createElement('span');d.append(span);
  for(const ch of text){
    span.append(ch);
    // 기본 속도 + 랜덤 흔들림. 문장부호 뒤에는 잠깐 더 머물러 설렘을 줍니다.
    let delay=speed+Math.random()*90;
    if(/[.!?…,~]/.test(ch))delay+=260;
    await new Promise(r=>setTimeout(r,delay));
  }
  d.insertAdjacentHTML('beforeend','<span class="quote">”</span>');
  const cur=document.createElement('span');cur.className='cursor';cur.textContent='_';d.append(cur);
  typing=false;
}

/* =========================================================================
   [5] 단계 전환 / BGM / 하트
   ========================================================================= */
function goStep(n){
  ['compose','deliver','receive'].forEach((id,i)=>
    document.getElementById(id).classList.toggle('show',i===n-1));
  document.querySelectorAll('.steps .s').forEach(s=>
    s.classList.toggle('active',Number(s.dataset.s)===n));
}
function startBGM(){
  const b=current.bgm;
  if(b&&b.src){try{if(audio)audio.pause();audio=new Audio(b.src);audio.loop=true;audio.play().catch(()=>{});}catch(_){}}
}
function stopBGM(){if(audio){audio.pause();audio=null;}}
function burstHearts(){
  const m=document.querySelector('main');const hs=['♥','♡','💕','💗'];
  for(let i=0;i<16;i++){const h=document.createElement('div');h.className='heartfx';
    h.textContent=hs[i%hs.length];h.style.left=Math.random()*100+'%';
    h.style.color=Math.random()>.5?'var(--pink)':'var(--pink-soft)';
    h.style.fontSize=(12+Math.random()*18)+'px';h.style.animationDelay=(Math.random()*1.4)+'s';
    h.style.animationDuration=(2.4+Math.random()*1.8)+'s';m.append(h);setTimeout(()=>h.remove(),4800);}
}

/* 처음으로 */
document.getElementById('again').onclick=()=>{
  stopBGM();goStep(1);document.getElementById('message').innerHTML='';

/* =========================================================================
   [6] 실제 ROS2 연동 — 노드가 {"type":"arrived"} 보내면 자동으로 STEP3 전환
   (노드는 STEP1에서 보낸 {"type":"goto",...}를 받아 목표좌표로 주행)
   ========================================================================= */
function connect(){
  let ws;try{ws=new WebSocket('ws://localhost:8765');}catch(e){return;}
  window.__ws=ws;const tag=document.getElementById('conn');
  ws.onopen=()=>{tag.textContent='● 터틀봇 연결됨';tag.className='on';flashLog('ROS2 브리지 연결됨');};
  ws.onclose=()=>{tag.textContent='○ 터틀봇 대기';tag.className='off';setTimeout(connect,2000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=(e)=>{try{const d=JSON.parse(e.data);if(d.type==='arrived')arrive();}catch(_){}};
}
connect();

/* ---------- 유틸 ---------- */
function stamp(){const d=new Date();const p=x=>String(x).padStart(2,'0');
  let h=d.getHours();const ap=h<12?'AM':'PM';h=h%12||12;
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}  ${p(h)}:${p(d.getMinutes())} ${ap}`;}
function flashLog(html){const log=document.getElementById('log');
  const t=new Date().toLocaleTimeString('ko-KR',{hour12:false});
  log.innerHTML=`[${t}] ${html}<br>`+log.innerHTML;}
</script>

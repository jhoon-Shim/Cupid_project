amcl:
  ros__parameters:
    use_sim_time: false

    # 파티클 설정
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    # 모션 모델 (차동 구동형)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2

    # 센서 모델
    laser_model_type: "likelihood_field"
    laser_min_range: -1.0
    laser_max_range: -1.0
    laser_likelihood_max_dist: 2.0
    z_hit: 0.5
    z_rand: 0.5
    z_short: 0.05
    z_max: 0.05

    # 업데이트 주기
    update_min_d: 0.25
    update_min_a: 0.2

    # 프레임 설정
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    tf_broadcast: true

    # 시간 설정
    transform_tolerance: 1.0
    save_pose_rate: 0.5
